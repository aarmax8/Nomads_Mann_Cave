<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AarMax8 — DILLIGAF Speakeasy Studio</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Nomad's">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/aarmax8/Nomads/b15a4394afade6bb543c1ece00102771641d1c82/Nicon5.png">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=IM+Fell+DW+Pica&family=Playfair+Display:ital,wght@0,600;1,600&family=Roboto+Condensed:wght@400;700&family=Rye&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
    html, body {
        overscroll-behavior-y: contain;
        overflow: hidden;
        height: 100vh;
        height: -webkit-fill-available;
        width: 100%;
        margin: 0;
        padding: 0;
        background-image: url('https://raw.githubusercontent.com/aarmax8/Nomads/c81556a569470611da64fb23e311817602720d95/pittsburghbridge.jpg');
        background-size: cover;
        background-position: center 85%;
        background-color: #000;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: -webkit-fill-available;
        width: 100%;
        background-color: transparent;
        box-sizing: border-box;
    }

    header {
        flex-shrink: 0;
        position: relative;
        height: calc(110px + env(safe-area-inset-top));
        z-index: 10;
        width: 100%;
        box-sizing: border-box;
    }

    main {
        flex-grow: 1;
        z-index: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        position: relative;
    }

    #header-logo-image {
        width: 100%;
        height: 100%;
        object-fit: fill;
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        z-index: 1;
    }

    #header-logo-container {
        max-width: 1200px;
        margin-left: auto;
        margin-right: auto;
        position: relative;
        height: 100%;
    }

    #header-logo-container::after {
        content: '';
        position: absolute;
        top: 80%;
        left: -150%;
        width: 200px;
        height: 200px;
        margin-top: -100px;
        background: radial-gradient(ellipse at center,
            rgba(255, 255, 255, 0.3) 0%,
            rgba(255, 255, 255, 0.05) 50%,
            rgba(255, 255, 255, 0) 70%
        );
        border-radius: 50%;
        filter: blur(20px);
        animation: glint-effect 7s infinite linear;
        z-index: 2;
    }

    @keyframes glint-effect {
        100% { left: 150%; }
    }

    #action-bar {
        flex-shrink: 0;
        height: 76px;
        padding: 0 max(0.6rem, env(safe-area-inset-right)) 0 max(0.6rem, env(safe-area-inset-left));
        box-sizing: border-box;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.55) 0%, rgba(0, 0, 0, 0.97) 100%);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(212, 175, 55, 0.28);
        box-shadow: 0 6px 18px -8px rgba(0, 0, 0, 0.8);
        display: flex;
        gap: 0.35rem;
        justify-content: center;
        align-items: center;
        z-index: 20;
    }

    .footer-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1 1 0;
        max-width: 96px;
        min-height: 54px;
        gap: 0.2rem;
        background: transparent;
        border: 1px solid transparent;
        color: #e8c766;
        padding: 0.3rem 0.15rem;
        border-radius: 0.7rem;
        cursor: pointer;
        line-height: 1.1;
        text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        transition: background-color .18s ease, border-color .18s ease, color .18s ease, transform .12s ease;
        -webkit-tap-highlight-color: transparent;
    }
    .footer-btn i {
        font-size: 1.3rem;
        color: inherit;
        filter: drop-shadow(0 1px 2px rgba(0,0,0,0.9));
        transition: transform .18s ease;
    }
    .footer-btn span {
        font-family: 'Roboto Condensed', sans-serif;
        font-weight: 700;
        font-size: 0.66rem;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        white-space: nowrap;
    }
    .footer-btn:hover {
        background-color: rgba(212, 175, 55, 0.10);
        border-color: rgba(212, 175, 55, 0.22);
    }
    .footer-btn:hover i { transform: translateY(-1px); }
    .footer-btn:active { transform: scale(0.92); }

    .carousel-view {
        display: flex;
        gap: 1.5rem;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scroll-behavior: smooth;
        scroll-padding: 1rem;
        -webkit-overflow-scrolling: touch;
        padding: 1rem 0;
        flex-grow: 1;
        min-height: 0;
        box-sizing: border-box;
    }

    .grid-view {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 1.5rem;
        overflow-y: auto;
        padding: 1.5rem;
        flex-grow: 1;
        min-height: 0;
        box-sizing: border-box;
    }

    #menu-grid.disable-animation .drink-card-inner { transition: none !important; }

    #menu-grid::-webkit-scrollbar { width: 8px; height: 8px; }
    #menu-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); border-radius: 4px; }
    #menu-grid::-webkit-scrollbar-thumb {
        background-color: #d4af37;
        border-radius: 4px;
        border: 2px solid rgba(0,0,0,0.5);
    }
    #menu-grid::-webkit-scrollbar-thumb:hover { background-color: #fbbf24; }
    #menu-grid { scrollbar-width: thin; scrollbar-color: #d4af37 rgba(0,0,0,0.5); }

    .drink-card {
        perspective: 1500px;
        background-color: transparent;
        transition: opacity 0.3s, transform 0.3s;
        position: relative;
        height: 540px;
        content-visibility: auto;
        contain-intrinsic-size: 320px 540px;
        contain: layout style;
    }

    .carousel-view .drink-card {
        flex: 0 0 82%;
        scroll-snap-align: center;
        margin-left: auto;
        margin-right: auto;
    }
    .carousel-view > .drink-card:first-child { margin-left: calc((100% - 82%) / 2); }
    .carousel-view > .drink-card:last-child { margin-right: calc((100% - 82%) / 2); }

    @media (min-width: 640px) {
        .carousel-view .drink-card { flex-basis: 58%; }
        .carousel-view > .drink-card:first-child { margin-left: calc((100% - 58%) / 2); }
        .carousel-view > .drink-card:last-child { margin-right: calc((100% - 58%) / 2); }
    }
    @media (min-width: 1024px) {
        .carousel-view .drink-card { flex-basis: 38%; }
        .carousel-view > .drink-card:first-child { margin-left: calc((100% - 38%) / 2); }
        .carousel-view > .drink-card:last-child { margin-right: calc((100% - 38%) / 2); }
    }

    .drink-card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease-in-out;
        transform-style: preserve-3d;
        box-shadow: 0 12px 20px -3px rgba(0, 0, 0, 0.6);
        border-radius: 0.75rem;
    }

    .drink-card.is-flipped .drink-card-inner { transform: rotateY(180deg); }
    .drink-card.is-active .drink-card-inner { box-shadow: 0 0 25px 8px rgba(212, 175, 55, 0.4); }
    .drink-card.is-active.is-flipped .drink-card-inner { box-shadow: 0 0 25px 8px rgba(180, 83, 9, 0.5); }
    .drink-card.is-highlighted .drink-card-inner { box-shadow: 0 0 30px 10px rgba(212, 175, 55, 0.85); }

    .drink-card-front, .drink-card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-radius: 0.75rem;
    }

    .drink-card-front {
        background-image: linear-gradient(135deg, #0e0d0b 0%, #1a1815 100%);
        border: 2px solid #d4af37;
        box-shadow: inset 0 0 24px rgba(212, 175, 55, 0.12);
    }

    .card-header-front {
        position: relative;
        padding: 1.1rem 3.5rem 0.5rem 1.25rem;
        background: transparent;
        border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        flex-shrink: 0;
    }

    .recipe-content {
        flex-grow: 1; /* Takes up available space */
        overflow-y: auto; /* SCROLLING ENABLED FOR INGREDIENTS */
        padding: 0.85rem 1.25rem;
        min-height: 0; /* Important for flex scrolling */
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
    }
    .recipe-content::-webkit-scrollbar { width: 4px; }
    .recipe-content::-webkit-scrollbar-thumb { background-color: #d4af37; border-radius: 4px; }

    .recipe-list-front { list-style: none; padding: 0; width: 100%; }
    .recipe-list-front li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px dashed rgba(212, 175, 55, 0.15);
        padding: 0.45rem 0;
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.15rem;
        line-height: 1.3;
        color: #f3f4f6;
    }
    
    .recipe-item-left {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        text-align: left;
    }
    
    .recipe-item-measure {
        font-family: 'Roboto Condensed', sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #d4af37;
        background: rgba(212, 175, 55, 0.1);
        padding: 0.15rem 0.45rem;
        border-radius: 0.2rem;
        border: 1px solid rgba(212, 175, 55, 0.25);
        flex-shrink: 0;
    }

    .card-pour-options {
        padding: 0.6rem 1.25rem;
        background: rgba(0, 0, 0, 0.45);
        border-top: 1px solid rgba(212, 175, 55, 0.15);
        font-family: 'Cormorant Garamond', serif;
        font-size: 0.9rem;
        flex-shrink: 0;
        max-height: 160px; /* ALLOWS SCROLLING FOR OPTIONS */
        overflow-y: auto;
    }
    .card-pour-options::-webkit-scrollbar { width: 4px; }
    .card-pour-options::-webkit-scrollbar-thumb { background-color: #d4af37; border-radius: 4px; }

    .pour-slot-label {
        display: block;
        color: #d4af37;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 0.7rem;
        font-weight: bold;
        margin-top: 0.25rem;
        font-family: 'Cinzel', serif;
    }

    .card-pour-badge {
        display: inline-block;
        padding: 0.15rem 0.5rem;
        background: rgba(212, 175, 55, 0.04);
        border: 1px solid rgba(212, 175, 55, 0.25);
        color: #e5e7eb;
        border-radius: 0.2rem;
        margin-right: 0.3rem;
        margin-top: 0.3rem;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
    }
    .card-pour-badge:hover {
        transform: scale(1.03);
        background: rgba(212, 175, 55, 0.15);
        border-color: #d4af37;
    }
    .card-pour-badge.is-top {
        background: rgba(212, 175, 55, 0.12);
        border-color: #d4af37;
        color: #fbbf24;
    }
    .card-pour-badge.is-out {
        background: rgba(40, 40, 40, 0.2);
        border-color: rgba(100, 100, 100, 0.2);
        color: #555555;
        text-decoration: line-through;
    }
    .card-pour-badge .why {
        display: block;
        font-weight: 400;
        font-size: 0.65rem;
        color: #9ca3af;
        letter-spacing: 0.02em;
        pointer-events: none;
    }

    /* POUR PICKS FOLDED INTO RECIPE (non-interactive) */
    .recipe-pours { width: 100%; margin-top: 0.35rem; }
    .pour-group { margin-top: 0.55rem; }
    .pour-group .pour-slot-label { margin-top: 0; }
    .pour-pick-list { list-style: none; padding: 0; margin: 0.2rem 0 0; }
    .pour-pick {
        display: flex;
        flex-direction: column;
        padding: 0.3rem 0;
        border-bottom: 1px dashed rgba(212, 175, 55, 0.12);
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.02rem;
        line-height: 1.25;
        color: #e5e7eb;
    }
    .pour-pick.is-top { color: #fbbf24; font-weight: 600; }
    .pour-pick.is-out { color: #555555; text-decoration: line-through; }
    .pour-pick .why {
        font-family: 'Roboto Condensed', sans-serif;
        font-size: 0.7rem;
        color: #9ca3af;
        letter-spacing: 0.02em;
        text-transform: none;
        font-weight: 400;
        text-decoration: none;
    }

    /* FRONT FOOTER (Specs) */
    .card-spec-tagline {
        text-align: center;
        font-family: 'Roboto Condensed', sans-serif;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(212, 175, 55, 0.7);
        padding: 0.75rem 1.25rem;
        border-top: 1px dashed rgba(212, 175, 55, 0.2);
        background: transparent;
        flex-shrink: 0;
    }

    .drink-card-back {
        transform: rotateY(180deg);
        background-color: #0c0a09;
        border: 2px solid #b45309;
        color: #f3f4f6;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;

        --bg-image: none;
        background-image:
            linear-gradient(to bottom, rgba(12, 10, 9, 0.8) 0%, transparent 20%),
            linear-gradient(to top, rgba(12, 10, 9, 1) 0%, rgba(12, 10, 9, 0.9) 30%, transparent 60%),
            var(--bg-image);

        background-position: center, center, top;
        background-repeat: no-repeat;
        background-size: 100% 100%, 100% 100%, cover;
    }

    .card-back-content {
        padding: 0 1.25rem;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        z-index: 2;
        margin-top: 1.5rem;
    }

    .story-text {
        font-family: 'IM Fell DW Pica', serif;
        font-style: italic;
        text-align: justify;
        font-size: 1.15rem;
        line-height: 1.5;
        color: #f3f4f6;
        text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        max-height: 190px;
        overflow-y: auto;
        padding-right: 0.5rem;
    }
    .story-text::-webkit-scrollbar { width: 4px; }
    .story-text::-webkit-scrollbar-thumb { background-color: #b45309; border-radius: 4px; }

    .no-image .card-back-content { margin-top: 0; justify-content: center; max-height: 100%; }
    .no-image { background-image: none; }

    /* BACK FOOTER (Hook / Description) */
    .card-footer-back {
         padding: 0.75rem 1.25rem;
         background: rgba(0,0,0,0.85);
         border-top: 2px solid rgba(180, 83, 9, 0.8);
         display: flex;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         min-height: 60px;
         z-index: 2;
         flex-shrink: 0;
         text-align: center;
    }

    .card-hook-text {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-size: 1.25rem;
        color: #fbbf24;
        line-height: 1.3;
        text-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
    }

    .favorite-btn {
        position: absolute;
        z-index: 10;
        background: rgba(0,0,0,0.6);
        border: 1px solid rgba(212,175,55,0.3);
        border-radius: 50%;
        width: 38px;
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
        transform: translateZ(0);
    }
    .is-flipped .drink-card-front .favorite-btn { display: none; }
    .drink-card-front .favorite-btn { top: 0.85rem; right: 0.85rem; }
    .favorite-btn:hover { transform: scale(1.1); background: rgba(0,0,0,0.8); border-color: #d4af37; }
    .favorite-btn .fa-heart { font-size: 1.1rem; color: #9ca3af; transition: all 0.2s ease; }
    .favorite-btn.is-favorite .fa-heart {
        color: #d4af37;
        text-shadow: 0 0 8px rgba(212, 175, 55, 0.7);
    }

    .drink-card.is-unavailable { opacity: 0.4; }

    .drink-card-title {
        font-family: 'Cinzel', serif;
        font-size: 1.75rem;
        line-height: 1.25;
        color: #d4af37;
        text-align: center;
        text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        padding-bottom: 0.15rem;
        font-weight: 700;
        letter-spacing: 0.03em;
    }
    .drink-card-subtitle {
        text-align: center;
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-size: 1.05rem;
        color: #a3a3a3;
        letter-spacing: .05em;
        margin-top: -.1rem;
        text-transform: uppercase;
    }

    .drink-card[data-is-barcode="true"] .drink-card-title {
        font-family: 'Cinzel', serif;
        font-size: 1.65rem;
    }
    .drink-card[data-is-barcode="true"] .drink-card-front {
        background-color: #0c0a08;
        border: 2px solid #d4af37;
        box-shadow: 0 8px 24px rgba(0,0,0,0.8);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.25rem;
        gap: 0.75rem;
    }
    .drink-card[data-is-barcode="true"] img {
        width: 80%;
        border-radius: 0.5rem;
        object-fit: contain;
        max-height: 50%;
        border: 1px solid rgba(212, 175, 55, 0.3);
    }

    /* Bottom Menu Active States */
    #app-footer {
        position: relative;
        flex-shrink: 0;
        z-index: 50;
        padding-bottom: calc(env(safe-area-inset-bottom) * 0.6 + 6px);
        padding-top: 10px;
        min-height: calc(50px + 10px + (env(safe-area-inset-bottom) * 0.6));
        box-sizing: border-box;
        background-color: rgba(15, 15, 15, 0.6);
        border-top: 1px solid rgba(212, 175, 55, 0.2);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        margin: 0;
    }

    #footer-content {
        width: 100%;
        max-width: 720px;
        height: 52px;
        display: flex;
        gap: 0.35rem;
        justify-content: center;
        align-items: center;
        padding: 0 0.6rem;
        box-sizing: border-box;
    }

    /* Active "gold chip" state for toggle buttons */
    #action-bar .footer-btn.is-active-filter,
    #action-bar #action-favorites-btn.is-active,
    #story-view-btn.is-active,
    #action-filter-btn.is-active-filter {
        color: #1a1305;
        background: linear-gradient(180deg, #f6d67a 0%, #d4af37 100%);
        border-color: #fbbf24;
        box-shadow: 0 0 14px rgba(212, 175, 55, 0.5), inset 0 1px 0 rgba(255,255,255,0.35);
        text-shadow: none;
    }
    #action-bar .footer-btn.is-active-filter i,
    #action-bar #action-favorites-btn.is-active i,
    #story-view-btn.is-active i,
    #action-filter-btn.is-active-filter i { color: #1a1305; }

    #splash-screen {
        position: fixed;
        inset: 0;
        height: 100%;
        height: -webkit-fill-available;
        z-index: 1000;
        background-color: #000;
        background-image: linear-gradient(to bottom, transparent 85%, #000 95%), url('https://raw.githubusercontent.com/aarmax8/Nomads/ac96a3e89384bc4f8a4feefe4af617c47d901a0e/splash.jpg');
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        cursor: pointer;
        transition: opacity 0.7s ease-out;
    }
    #splash-screen.is-hidden { opacity: 0; pointer-events: none; }

    .splash-text {
        font-family: 'Cinzel', serif;
        font-size: 1.25rem;
        color: #d4af37;
        text-shadow: 0 0 15px rgba(212, 175, 55, 0.4), 0 0 5px rgba(0, 0, 0, 1);
        background-color: rgba(0,0,0,0.7);
        padding: 0.75rem 1.75rem;
        border-radius: 9999px;
        border: 1px solid rgba(212,175,55,0.4);
        animation: pulse-text 2.5s infinite;
        margin-bottom: calc(15vh + env(safe-area-inset-bottom));
    }
    @keyframes pulse-text {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.04); opacity: 1; }
    }

    /* Beautiful Bottom Sheet Filter Modal */
    .modal { transition: opacity 0.3s ease-in-out; }
    #filter-modal .modal-panel {
        margin-top: auto; /* Dock to bottom */
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
        border-bottom: none;
        background-image: linear-gradient(to top, rgba(10, 10, 10, 1) 0%, rgba(20, 20, 20, 0.98) 100%);
        border-top: 2px solid #d4af37;
        box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
    }
    .modal-panel {
        background-image:

/* ---------- derive categories & availability ---------- */
function parseIngredient(line) {
    let name = line.replace(/^[\d./\s-]+(oz|dashes|dash)\s*/i, '');
    const phrases = ['Fill a tall glass with ', 'Fill with ', 'Top with ', 'Float the ', 'Splash of ', 'Splash ', 'Dash of '];
    for (const p of phrases) {
        if (name.toLowerCase().startsWith(p.toLowerCase())) {
            name = name.substring(p.length);
            const i = name.toLowerCase().indexOf(' in a');
            if (i > -1) name = name.substring(0, i);
            const j = name.toLowerCase().indexOf(' on top');
            if (j > -1) name = name.substring(0, j);
            break;
        }
    }
    name = name.replace(/,\s*\d+\s*dashes?$/i, '').trim();
    return ALL_INGREDIENTS.includes(name) ? name : null;
}

function allIngredientsOf(d) {
    const out = [];
    d.recipe.forEach(line => { const n = parseIngredient(line); if (n) out.push(n); });
    return out;
}

MENU.forEach(d => {
    const text = (d.recipe.join(' ') + ' ' + (d.pours || []).map(p => p.slot).join(' ')).toLowerCase();
    const cats = new Set();
    if (/orange juice|pineapple juice|cranberry juice|sour mix|black coffee|hot water/.test(text)) cats.add('Brunch');
    if (/club soda|tonic water|sprite|iced tea/.test(text)) cats.add('Lunch');
    if (/cola/.test(text)) cats.add('Dinner');
    const dessert = d.pours && d.pours.some(p => p.picks.some(k => /Baileys|Kahlúa|Amaretto|Butterscotch|Root Beer/.test(k.n)));
    if (dessert) cats.add('Dessert');
    if (cats.size === 0) cats.add('Dinner');
    d.category = Array.from(cats);

    const fams = new Set();
    if (d.pours) {
        d.pours.forEach(p => p.picks.forEach(k => { if (SPIRIT_FAMILY[k.n]) fams.add(SPIRIT_FAMILY[k.n]); }));
    }
    d.recipe.forEach(l => { const n = parseIngredient(l); if (n && SPIRIT_FAMILY[n]) fams.add(SPIRIT_FAMILY[n]); });
    d.families = Array.from(fams);
    d.fixedIngredients = allIngredientsOf(d);
});

function getServeSpec(d) {
    return SERVE_OVERRIDES[d.name] || { glass: "Rocks Glass", method: "Stirred & Strained", type: "short" };
}

function recipeLine(line) {
    const name = parseIngredient(line);
    const [icon, color] = iconFor(name || line);
    const missing = name && !inStock(name);
    
    const match = line.match(/^([\d./\-]+\s*(?:oz|dashes|dash|drops|drop|tbsp|tsp|splash|Fill with|Fill a tall glass with|Top with|Float the)?)\s*(.*)$/i);
    let measure = "";
    let ingredientText = line;
    if (match) {
        measure = match[1].trim();
        ingredientText = match[2].trim();
    }
    
    return `
    <li class="${missing ? 'is-missing opacity-30 line-through' : ''}">
        <div class="recipe-item-left">
            <i class="fas ${icon} text-[0.8rem] flex-shrink-0" style="color:${color}"></i>
            <span class="font-normal text-gray-200 tracking-wide text-[1rem]">${ingredientText}</span>
        </div>
        ${measure ? `<span class="recipe-item-measure">${measure}</span>` : ''}
    </li>`;
}

function pourRecipeBlock(d) {
    if (!d.pours || !d.pours.length) return '';
    const groups = d.pours.map(p => {
        const picks = p.picks.map((k, i) => {
            const out = !inStock(k.n);
            const cls = out ? 'is-out' : (i === 0 ? 'is-top' : '');
            const star = (i === 0 && !out) ? '★ ' : '';
            return `<li class="pour-pick ${cls}">${star}${k.n}<span class="why">${k.why}</span></li>`;
        }).join('');
        return `<div class="pour-group"><span class="pour-slot-label">${p.slot}</span><ul class="pour-pick-list">${picks}</ul></div>`;
    }).join('');
    return `<div class="recipe-pours">${groups}</div>`;
}

function buildTOC() {
    const groups = [
        { title: "Whiskey & Bourbon", families: ["Whiskey & Bourbon"] },
        { title: "Vodka", families: ["Vodka"] },
        { title: "Gin", families: ["Gin"] },
        { title: "Rum", families: ["Rum"] },
        { title: "Agave & Tequila", families: ["Tequila"] },
        { title: "Brandy & Liqueurs", families: ["Brandy", "Liqueurs & Schnapps", "Other"] },
        { title: "Zero Proof", families: ["Zero Proof", "None"] }
    ];

    let html = '';
    
    groups.forEach(group => {
        const items = CARDS.map((c, index) => ({ c, index })).filter(({ c }) => {
            if (c.isBarcode) return false;
            if (group.title === "Zero Proof" && c.families.length === 0) return true;
            if (c.families.length === 0) return false;
            
            const primaryFamily = c.families[0];
            return group.families.includes(primaryFamily) || 
                   (group.title === "Brandy & Liqueurs" && !["Whiskey & Bourbon", "Vodka", "Gin", "Rum", "Tequila"].includes(primaryFamily));
        });

        if (items.length > 0) {
            html += `
            <div class="toc-category-header">${group.title}</div>
            <div class="grid grid-cols-2 gap-1.5 mb-3">
                ${items.map(({ c, index }) => `<div class="toc-item" data-goto="${index}">${c.name}</div>`).join('')}
            </div>`;
        }
    });

    return html;
}

function visibleCards() {
    return CARDS.filter(d => {
        if (d.isBarcode) return true;
        if (filters.favesOnly && !favorites.includes(d.name)) return false;
        if (filters.category !== 'all' && !d.category.includes(filters.category)) return false;
        if (filters.family && !d.families.includes(filters.family)) return false;
        
        if (filters.ingredient) {
            const hasFixed = d.fixedIngredients.includes(filters.ingredient);
            const hasPour = d.pours && d.pours.some(p => p.picks.some(k => k.n === filters.ingredient));
            if (!hasFixed && !hasPour) return false;
        }
        if (filters.glassType && getServeSpec(d).type !== filters.glassType) return false;
        return true;
    });
}

    if (favBtn) {
        e.stopPropagation();
        const n = favBtn.dataset.fav;
        const i = favorites.indexOf(n);
        if (i > -1) favorites.splice(i, 1); else favorites.push(n);
        saveFaves();
        favBtn.classList.toggle('is-favorite');
        if (filters.favesOnly) render();
        return;
    }
    
    // 2. Table of Contents navigation
    const toc = e.target.closest('.toc-item');
    if (toc) {
        e.stopPropagation();
        const cardIndex = toc.dataset.goto;
        
        if (filters.category !== 'all' || filters.family || filters.favesOnly || filters.ingredient) {
            filters = { category: 'all', family: null, favesOnly: false, ingredient: null };
            render();
        }

        const card = menuGrid.querySelector(`.drink-card[data-idx="${cardIndex}"]`);
        if (card) {
            menuGrid.querySelectorAll('.drink-card').forEach(c => c.classList.remove('is-highlighted'));
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            card.classList.add('is-highlighted');
            setTimeout(() => card.classList.remove('is-highlighted'), 2000);
        }
        return;
    }

    // 4. Flip Card
    const card = e.target.closest('.drink-card');
    if (card) card.classList.toggle('is-flipped');
});

function snap(dir) {
    const cards = [...menuGrid.querySelectorAll('.drink-card')];
    if (!cards.length) return;
    const r = menuGrid.getBoundingClientRect();
    const mid = r.left + r.width / 2;
    let best = 0, min = Infinity;
    cards.forEach((c, i) => {
        const cr = c.getBoundingClientRect();
        const d = Math.abs(mid - (cr.left + cr.width / 2));
        if (d < min) { min = d; best = i; }
    });
    const t = cards[Math.max(0, Math.min(cards.length - 1, best + dir))];
    if (t) t.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

document.getElementById('scroll-next-btn').onclick = () => snap(1);
document.getElementById('scroll-prev-btn').onclick = () => snap(-1);

    if (!cards.length) return;
    const c = cards[Math.floor(Math.random() * cards.length)];
    c.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    c.classList.add('is-highlighted');
    setTimeout(() => c.classList.remove('is-highlighted'), 2000);
};
document.getElementById('action-favorites-btn').onclick = () => openModal('favorites-modal');

let isGrid = false;
document.getElementById('action-view-btn').onclick = e => {
    isGrid = !isGrid;
    menuGrid.className = isGrid ? 'grid-view' : 'carousel-view';
    const b = e.currentTarget;
    b.querySelector('span').textContent = isGrid ? 'Cards' : 'Grid';
    b.querySelector('i').className = isGrid ? 'fas fa-rectangle-list' : 'fas fa-table-cells-large';
};

/* ---------- modals ---------- */
function openModal(id) {
    const m = document.getElementById(id);
    m.classList.remove('hidden');
    requestAnimationFrame(() => m.classList.remove('opacity-0'));
}
function closeModal(id) {
    const m = document.getElementById(id);
    m.classList.add('opacity-0');
    setTimeout(() => m.classList.add('hidden'), 300);
}
['bar-stock-modal', 'filter-modal', 'favorites-modal'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => { if (e.target.id === id) closeModal(id); });
});
document.getElementById('close-stock-btn').onclick = () => closeModal('bar-stock-modal');
document.getElementById('close-filter-btn').onclick = () => closeModal('filter-modal');
document.getElementById('close-favorites-btn').onclick = () => closeModal('favorites-modal');

/* Stock */
function renderStock() {
    const el = document.getElementById('bar-stock-content');
    el.innerHTML = Object.entries(ingredientCategories).map(([group, subs]) => `
        <div class="stock-group-title">${group}</div>
        ${Object.entries(subs).map(([sub, items]) => `
            <div class="stock-sub-title">${sub}</div>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                ${items.map(i => `
                    <button class="stock-btn ${inStock(i) ? 'in-stock' : ''}" data-ing="${i}">
                        <i class="fas ${inStock(i) ? 'fa-check' : 'fa-xmark'}"></i><span>${i}</span>
                    </button>`).join('')}
            </div>`).join('')}
    `).join('');
    const n = MENU.filter(isMakeable).length;
    document.getElementById('stock-summary').textContent = `${n} of ${MENU.length} drinks pourable with what's on the shelf.`;
}
document.getElementById('bar-stock-content').addEventListener('click', e => {
    const b = e.target.closest('.stock-btn');
    if (!b) return;
    const i = b.dataset.ing;
    barStock[i] = !inStock(i);
    saveStock(); renderStock(); render();
});
document.getElementById('stock-all-btn').onclick = () => { ALL_INGREDIENTS.forEach(i => barStock[i] = true); saveStock(); renderStock(); render(); };
document.getElementById('stock-none-btn').onclick = () => { ALL_INGREDIENTS.forEach(i => barStock[i] = false); saveStock(); renderStock(); render(); };
document.getElementById('action-stock-btn').onclick = () => { renderStock(); openModal('bar-stock-modal'); };

/* Filters */
const CATEGORIES = ['all', 'Brunch', 'Lunch', 'Dinner', 'Dessert'];
const FAMILIES = Object.keys(ingredientCategories.Spirits);

const CAT_ICON = { all: 'fa-layer-group', Brunch: 'fa-mug-saucer', Lunch: 'fa-sun', Dinner: 'fa-moon', Dessert: 'fa-ice-cream' };
const GLASS_TYPES = [
    { key: 'shot', label: 'Shots', icon: 'fa-whiskey-glass' },
    { key: 'shooter', label: 'Shooters', icon: 'fa-flask' },
    { key: 'short', label: 'Short Glass', icon: 'fa-wine-glass' },
    { key: 'tall', label: 'Tall Glass', icon: 'fa-bottle-droplet' },
    { key: 'up', label: 'Up / Coupe', icon: 'fa-martini-glass' },
    { key: 'warm', label: 'Warm', icon: 'fa-mug-hot' }
];

function filterMatchCount() {
    return visibleCards().filter(d => !d.isBarcode).length;
}
function updateApplyButton() {
    const btn = document.getElementById('apply-filters-btn');
    if (!btn) return;
    const n = filterMatchCount();
    if (n === 0) { btn.disabled = true; btn.textContent = 'No matches'; }
    else { btn.disabled = false; btn.textContent = `Show ${n} ${n === 1 ? 'drink' : 'drinks'}`; }
}
function renderFilters() {
    document.getElementById('filter-modal-content').innerHTML = `
        <div class="filter-section">
            <div class="filter-sheet-eyebrow">Time of Day</div>
            <div class="filter-row">
                ${CATEGORIES.map(c => `<button class="filter-pill ${filters.category === c ? 'is-active' : ''}" data-cat="${c}"><i class="fas ${CAT_ICON[c] || 'fa-martini-glass'}"></i>${c === 'all' ? 'All' : c}</button>`).join('')}
            </div>
        </div>
        <div class="filter-section">
            <div class="filter-sheet-eyebrow">Base Spirit</div>
            <div class="filter-row">
                ${FAMILIES.map(f => `<button class="filter-pill ${filters.family === f ? 'is-active' : ''}" data-fam="${f}"><i class="fas ${(FAMILY_ICON[f] || ['fa-wine-bottle'])[0]}"></i>${f}</button>`).join('')}
            </div>
        </div>
        <div class="filter-section">
            <div class="filter-sheet-eyebrow">Glassware</div>
            <div class="filter-row">
                ${GLASS_TYPES.map(g => `<button class="filter-pill ${filters.glassType === g.key ? 'is-active' : ''}" data-glass="${g.key}"><i class="fas ${g.icon}"></i>${g.label}</button>`).join('')}
            </div>
        </div>
        <div class="filter-section">
            <div class="filter-sheet-eyebrow">Favorites</div>
            <div class="filter-row">
                <button class="filter-pill ${filters.favesOnly ? 'is-active' : ''}" data-faves="1"><i class="fas fa-heart"></i>Favorites only</button>
            </div>
        </div>`;
    updateApplyButton();
}
document.getElementById('filter-modal-content').addEventListener('click', e => {
    const p = e.target.closest('.filter-pill');
    if (!p) return;
    if (p.dataset.cat) filters.category = p.dataset.cat;
    if (p.dataset.fam) filters.family = (filters.family === p.dataset.fam) ? null : p.dataset.fam;
    if (p.dataset.glass) filters.glassType = (filters.glassType === p.dataset.glass) ? null : p.dataset.glass;
    if (p.dataset.faves) filters.favesOnly = !filters.favesOnly;
    
    // Clear ingredient filter if user is doing broad filtering
    filters.ingredient = null;
    
    renderFilters();
});
document.getElementById('reset-filters-btn').onclick = () => {
    filters = { category: 'all', family: null, favesOnly: false, ingredient: null, glassType: null };
    renderFilters(); render();
};
document.getElementById('apply-filters-btn').onclick = () => { render(); closeModal('filter-modal'); };
document.getElementById('action-filter-btn').onclick = () => { renderFilters(); openModal('filter-modal'); };

/* Favorites list */
function renderFavorites() {
    const el = document.getElementById('favorites-list-container');
    if (!favorites.length) {
        el.innerHTML = `<p class="text-gray-400 text-center py-8">No favorites yet. Tap the heart on any card.</p>`;
        return;
    }
    el.innerHTML = favorites.slice().sort().map(n =>
        `<div class="favorite-item cursor-pointer hover:bg-gray-800 p-2 rounded-lg transition-colors" data-name="${n}"><i class="fas fa-heart text-amber-500 mr-3"></i><span class="font-bold">${n}</span></div>`).join('');
}
document.getElementById('favorites-list-container').addEventListener('click', e => {
    const it = e.target.closest('.favorite-item');
    if (!it) return;
    closeModal('favorites-modal');
    
    if (filters.category !== 'all' || filters.family || filters.favesOnly || filters.ingredient) {
        filters = { category: 'all', family: null, favesOnly: false, ingredient: null };
        render();
    }

    const card = menuGrid.querySelector(`.drink-card[data-name="${CSS.escape(it.dataset.name)}"]`);
    if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        card.classList.add('is-highlighted');
        setTimeout(() => card.classList.remove('is-highlighted'), 2000);
    }
});
document.getElementById('action-favorites-btn').onclick = () => { renderFavorites(); openModal('favorites-modal'); };

/* Splash */
const splash = document.getElementById('splash-screen');
splash.addEventListener('click', () => {
    splash.classList.add('is-hidden');
    setTimeout(() => splash.remove(), 800);
});

/* ---------- Speakeasy SFX (synthesized, no external files) ---------- */
const SFX = (function () {
    let ctx = null, master = null, room = null, noiseBuf = null, muted = false;
    function ensure() {
        if (ctx) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        ctx = new AC();
        master = ctx.createGain();
        master.gain.value = 0.9;
        master.connect(ctx.destination);
        // subtle back-room ambiance via a short feedback delay
        const inGain = ctx.createGain(); inGain.gain.value = 1;
        const delay = ctx.createDelay(); delay.delayTime.value = 0.11;
        const fb = ctx.createGain(); fb.gain.value = 0.26;
        const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 500;
        const wet = ctx.createGain(); wet.gain.value = 0.32;
        inGain.connect(delay); delay.connect(fb); fb.connect(delay);
        delay.connect(hp); hp.connect(wet); wet.connect(master);
        room = inGain;
        const len = Math.floor(ctx.sampleRate * 1.0);
        noiseBuf = ctx.createBuffer(1, len, ctx.sampleRate);
        const d = noiseBuf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    }
    function resume() { ensure(); if (ctx && ctx.state === 'suspended') ctx.resume(); }
    // a single bell-like partial (glass ring)
    function partial(t, freq, gain, dur) {
        const o = ctx.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(freq, t);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(gain, t + 0.004);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g); g.connect(master); if (room) g.connect(room);
        o.start(t); o.stop(t + dur + 0.03);
    }
    // glass clink: inharmonic bell partials + a tiny onset tick
    function clinkAt(t, vol, base) {
        partial(t, base, vol * 0.9, 0.30);
        partial(t, base * 2.76, vol * 0.5, 0.18);
        partial(t, base * 5.18, vol * 0.26, 0.10);
        const ns = ctx.createBufferSource(); ns.buffer = noiseBuf;
        const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 6500; bp.Q.value = 0.8;
        const g = ctx.createGain();
        g.gain.setValueAtTime(vol * 0.35, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.03);
        ns.connect(bp); bp.connect(g); g.connect(master);
        ns.start(t); ns.stop(t + 0.05);
    }
    function clink(vol, base) { resume(); if (!ctx || muted) return; clinkAt(ctx.currentTime + 0.005, vol || 0.42, base || 2100); }
    function tick() { resume(); if (!ctx || muted) return; clinkAt(ctx.currentTime + 0.005, 0.24, 3200); }
    // warm welcome chord, gently rolled (Cmaj9), finished with a glass clink
    function welcome() {
        resume(); if (!ctx || muted) return;
        const t0 = ctx.currentTime + 0.03;
        const notes = [261.63, 329.63, 392.00, 493.88, 587.33];
        notes.forEach((f, i) => {
            const t = t0 + i * 0.055;
            const o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
            const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f * 2;
            const o2g = ctx.createGain(); o2g.gain.value = 0.12;
            const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 2600;
            const g = ctx.createGain();
            g.gain.setValueAtTime(0.0001, t);
            g.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, t + 1.5);
            o.connect(lp); o2.connect(o2g); o2g.connect(lp); lp.connect(g);
            g.connect(master); if (room) g.connect(room);
            o.start(t); o2.start(t); o.stop(t + 1.6); o2.stop(t + 1.6);
        });
        clinkAt(t0 + 0.30, 0.3, 2600);
    }
    // cocktail shaker (ice rattle) for the dice / random pick, ending on a clink
    function shake() {
        resume(); if (!ctx || muted) return;
        const t0 = ctx.currentTime + 0.02, shakes = 6;
        for (let i = 0; i < shakes; i++) {
            const t = t0 + i * 0.115;
            const ns = ctx.createBufferSource(); ns.buffer = noiseBuf;
            const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
            bp.frequency.value = 2500 + (i % 2 ? 800 : 0); bp.Q.value = 1.1;
            const g = ctx.createGain();
            g.gain.setValueAtTime(0.0001, t);
            g.gain.exponentialRampToValueAtTime(0.5, t + 0.012);
            g.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
            ns.connect(bp); bp.connect(g); g.connect(master); if (room) g.connect(room);
            ns.start(t); ns.stop(t + 0.11);
        }
        clinkAt(t0 + shakes * 0.115 + 0.05, 0.4, 2000);
    }
    function toggleMute(force) {
        muted = (typeof force === 'boolean') ? force : !muted;
        if (master) master.gain.value = muted ? 0 : 0.9;
        return muted;
    }
    return { resume, clink, tick, welcome, shake, toggleMute };
})();

/* wire speakeasy sounds to the controls */
(function () {
    splash.addEventListener('click', () => SFX.welcome(), { once: true });
    document.querySelectorAll('#action-bar .footer-btn, #footer-content .footer-btn').forEach(b => {
        b.addEventListener('click', () => { b.id === 'action-random-btn' ? SFX.shake() : SFX.clink(); });
    });
    document.getElementById('filter-modal-content').addEventListener('click', e => { if (e.target.closest('.filter-pill')) SFX.tick(); });
    document.getElementById('bar-stock-content').addEventListener('click', e => { if (e.target.closest('.stock-btn')) SFX.tick(); });
    const st = document.getElementById('sound-toggle');
    st.addEventListener('click', () => {
        const m = SFX.toggleMute();
        st.classList.toggle('is-muted', m);
        st.querySelector('i').className = m ? 'fas fa-volume-xmark' : 'fas fa-volume-high';
        if (!m) SFX.clink(0.4);
    });
})();

/* Go */
render();
</script>
