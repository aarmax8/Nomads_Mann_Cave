<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOMAD'S | DILLIGAF Menu Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root {
            --gold: #d97706;
            --dark-bg: #000000;
        }
        
        body {
            background-color: var(--dark-bg);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .font-cinzel { font-family: 'Cinzel', serif; }

        .card-perspective { perspective: 1000px; }
        .card-container {
            width: 300px;
            height: 480px;
            cursor: pointer;
            margin: 0 auto;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border: 2px solid var(--gold);
            border-radius: 0.75rem;
            background: linear-gradient(145deg, #14100e, #0a0807);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .card-back {
            transform: rotateY(180deg);
            background: #1a1512;
            justify-content: center;
            align-items: center;
        }

        #app-footer .footer-btn, 
        #app-footer .footer-btn i, 
        #app-footer .footer-btn span {
            color: #d97706 !important;
        }

        .carousel-view {
            display: flex; 
            gap: 1.5rem; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            padding: 2rem;
            flex-grow: 1;
            scrollbar-width: none;
        }

        /* Custom scrollbar for better feel */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased text-gray-200">

    <div id="app" class="flex flex-col h-screen w-full">
        <header class="h-24 bg-black flex flex-col items-center justify-center border-b border-amber-900 shrink-0">
            <h1 class="text-3xl font-bold text-amber-600 font-cinzel tracking-widest">NOMAD'S</h1>
            <div id="filter-bar" class="flex gap-2 mt-4">
                <button class="filter-btn px-4 py-1 border border-amber-600 rounded-full text-xs text-amber-600 hover:bg-amber-900/20" onclick="renderMenu('All')">All</button>
                <button class="filter-btn px-4 py-1 border border-amber-600 rounded-full text-xs text-amber-600 hover:bg-amber-900/20" onclick="renderMenu('Vodka')">Vodka</button>
                <button class="filter-btn px-4 py-1 border border-amber-600 rounded-full text-xs text-amber-600 hover:bg-amber-900/20" onclick="renderMenu('Gin')">Gin</button>
                <button class="filter-btn px-4 py-1 border border-amber-600 rounded-full text-xs text-amber-600 hover:bg-amber-900/20" onclick="renderMenu('Whiskey')">Whiskey</button>
            </div>
        </header>
        
        <main class="flex-1 overflow-hidden flex flex-col">
            <div id="menu-grid" class="carousel-view">
                <!-- Cards will be injected here -->
            </div>
        </main>

        <footer id="app-footer" class="h-20 bg-[#0f0c0a] border-t border-amber-600 flex justify-around items-center shrink-0">
            <button class="footer-btn flex flex-col items-center"><i class="fas fa-home text-xl"></i><span class="text-xs">Home</span></button>
            <button class="footer-btn flex flex-col items-center"><i class="fas fa-motorcycle text-xl"></i><span class="text-xs">Rewind</span></button>
            <button class="footer-btn flex flex-col items-center"><i class="fas fa-book-open text-xl"></i><span class="text-xs">Story</span></button>
            <button class="footer-btn flex flex-col items-center"><i class="fas fa-forward text-xl"></i><span class="text-xs">Skip</span></button>
        </footer>
    </div>

    <script>
        const getCocktailData = () => [
            { 
                name: "Appletini", category: "Vodka",
                pours: ["Skyy Vodka", "Grey Goose", "Tito's Handmade"],
                recipe: "Sweet & Sour, Apple Pucker, Vodka",
                story: "A sharp, modern classic. We utilize our house-standard Skyy Vodka to provide a crisp foundation that lets the apple notes shine without bite."
            },
            { 
                name: "Cosmopolitan", category: "Vodka",
                pours: ["Skyy Vodka", "Grey Goose", "Tito's Handmade"],
                recipe: "Vodka, Triple Sec, Cranberry, Lime",
                story: "Sophisticated and balanced. Our Skyy Vodka ensures a clean spirit base that complements the tartness of the cranberry perfectly."
            },
            { 
                name: "Tom Collins", category: "Gin",
                pours: ["Beefeater Gin", "Tanqueray Gin", "Bombay Sapphire"],
                recipe: "Gin, Lemon Juice, Sugar, Soda",
                story: "The quintessential refreshment. Using Beefeater adds a classic juniper backbone that stands up to the lemon and bubbles."
            },
            {
                name: "Martini", category: "Gin",
                pours: ["Beefeater Gin", "Tanqueray Gin", "Bombay Sapphire"],
                recipe: "Gin, Dry Vermouth, Lemon Twist",
                story: "The ultimate test of a bartender's skill. We keep it cold and serve it with the aromatic complexity of our premium gin selection."
            },
            {
                name: "Old Fashioned", category: "Whiskey",
                pours: ["Woodford Reserve", "WhistlePig", "Michter's"],
                recipe: "High-End Bourbon, Sugar, Bitters",
                story: "A drink for the seasoned traveler. Only our high-tier bourbons make the cut for this slow-sipping masterpiece."
            },
            {
                name: "Whiskey Sour", category: "Whiskey",
                pours: ["Jameson Irish", "Maker's Mark", "Bulleit Bourbon"],
                recipe: "Whiskey, Lemon, Syrup, Egg White",
                story: "Balanced and bright. We pair our mid-range whiskeys here to ensure the citrus never overwhelms the spirit's oaky character."
            },
            {
                name: "Highball", category: "Whiskey",
                pours: ["Jim Beam", "Old Grand-Dad", "Southern Comfort"],
                recipe: "Whiskey, Soda Water",
                story: "Unpretentious and reliable. We mix these with our honest, gritty whiskeys for a drink that respects the open road."
            }
        ];

        function renderMenu(filter = 'All') {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            
            const data = getCocktailData().filter(d => filter === 'All' || d.category === filter);
            
            data.forEach(drink => {
                const cardWrapper = document.createElement('div');
                cardWrapper.className = 'card-perspective shrink-0';
                
                const card = document.createElement('div');
                card.className = 'card-container';
                card.onclick = () => card.classList.toggle('flipped');
                
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="font-cinzel text-2xl text-amber-500 mb-2">${drink.name}</div>
                            <div class="text-xs text-amber-700 uppercase tracking-widest mb-6">${drink.category} Selection</div>
                            <div class="text-left space-y-4">
                                <div class="text-sm font-bold border-b border-amber-900 pb-2 text-amber-600">Premium Pours:</div>
                                <ul class="text-amber-200 text-sm space-y-2">
                                    ${drink.pours.map(p => `<li><i class="fas fa-glass-martini-alt mr-2 text-xs"></i> ${p}</li>`).join('')}
                                </ul>
                                <div class="mt-auto pt-4 text-xs text-gray-500 italic text-center">Tap for Story...</div>
                            </div>
                        </div>
                        <div class="card-back p-6 text-center">
                            <i class="fas fa-book-open text-amber-600 text-3xl mb-4"></i>
                            <p class="text-amber-100 italic leading-relaxed font-serif">"${drink.story}"</p>
                            <p class="mt-6 text-xs text-amber-700 uppercase tracking-widest">Recipe: ${drink.recipe}</p>
                        </div>
                    </div>
                `;
                cardWrapper.appendChild(card);
                grid.appendChild(cardWrapper);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderMenu();
        });
    </script>
</body>
</html>
